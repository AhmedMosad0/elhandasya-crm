<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Handasya — CRM Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@600;700;800&family=Readex+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9b298; --gold-d:#b09a80; --gold-l:#f7f2eb; --gold-ll:#fbf8f4;
  --charcoal:#201f23; --slate:#464e52; --silver:#e5e5e4;
  --ink:#201f23; --ink-2:#464e52; --mute:#7f7f7f;
  --bg:#f4f3f0; --card:#ffffff; --border:#e5e5e4; --border-l:#f0efec;
  --green:#2e7d4f; --green-l:#edf7f1;
  --amber:#b45309; --amber-l:#fdf5e6;
  --blue:#1e5590; --blue-l:#e8f0fb;
  --red:#c0392b; --red-l:#fdecea;
  --purple:#6d28d9; --purple-l:#f5f3ff;
  --sidebar:#201f23; --sidebar-2:#2c2b30;
  --r6:6px; --r8:8px; --r12:12px; --r16:16px;
  --sh1:0 1px 3px rgba(32,31,35,.07);
  --sh2:0 4px 12px rgba(32,31,35,.10);
  --sh3:0 16px 40px rgba(32,31,35,.14);
  --sw:268px; --th:60px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:13.5px;line-height:1.5}
h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif}
input,select,textarea,button{font-family:'DM Sans',inherit;font-size:13.5px}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--silver);border-radius:99px}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#201f23 0%,#2f2d34 55%,#3b3729 100%);
  position:relative;overflow:hidden}
#loginScreen::before{content:'';position:absolute;inset:0;opacity:.05;
  background:repeating-linear-gradient(60deg,transparent,transparent 30px,rgba(201,178,152,.3) 30px,rgba(201,178,152,.3) 31px)}
#loginScreen::after{content:'';position:absolute;bottom:-180px;right:-180px;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,178,152,.08) 0%,transparent 70%)}
.login-box{background:white;border-radius:20px;padding:44px 40px;width:430px;box-shadow:var(--sh3);position:relative;z-index:1}
.login-brand{text-align:center;margin-bottom:28px}
.login-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
.login-name{text-align:left}
.login-title-big{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:var(--ink);letter-spacing:1px;text-transform:uppercase;line-height:1.1}
.login-subtitle{font-size:10px;color:var(--mute);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.login-divider{height:1px;background:var(--border);margin:18px 0}
.login-h{font-size:17px;font-weight:700;margin-bottom:3px}
.login-sub{color:var(--mute);font-size:12.5px;margin-bottom:22px}
.lf-group{margin-bottom:14px}
.lf-label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.lf-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r8);outline:none;transition:border-color .15s;background:var(--bg);color:var(--ink)}
.lf-input:focus{border-color:var(--gold);background:white}
.lf-btn{width:100%;padding:12px;background:var(--charcoal);color:white;border:none;border-radius:var(--r8);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;font-family:'Plus Jakarta Sans',sans-serif}
.lf-btn:hover{background:var(--slate)}
.lf-btn-client{background:var(--gold);color:var(--charcoal)}.lf-btn-client:hover{background:var(--gold-d)}
.lf-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.login-hints{margin-top:20px;background:var(--bg);border-radius:var(--r8);padding:13px;border:1px solid var(--border)}
.login-hints-title{font-size:10px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.hint-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--mute)}
.hint-row span{font-weight:600;color:var(--ink);font-family:monospace;background:var(--border-l);padding:1px 7px;border-radius:4px;font-size:11px}
.login-portal-toggle{text-align:center;margin-top:14px;font-size:12.5px;color:var(--mute)}
.login-portal-toggle a{color:var(--gold-d);font-weight:600;cursor:pointer}

/* ── APP SHELL ── */
#appContainer{display:flex;min-height:100vh}
#sidebar{width:var(--sw);background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-brand{display:flex;align-items:center;gap:11px}
.sb-logo-wrap{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-name{color:white;font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.1}
.sb-sub{color:rgba(201,178,152,.5);font-size:9px;margin-top:2px;letter-spacing:.6px;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.25);padding:8px 8px 4px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r8);color:rgba(255,255,255,.55);cursor:pointer;transition:all .12s;font-size:13px;font-weight:500;margin-bottom:1px;position:relative}
.nav-item:hover{background:rgba(201,178,152,.08);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--gold);color:var(--charcoal);font-weight:700}
.nav-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:var(--charcoal);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-item.active .nav-badge{background:rgba(32,31,35,.25)}
.sb-footer{padding:14px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--charcoal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;flex-shrink:0}
.sb-uname{color:white;font-size:12.5px;font-weight:600}
.sb-urole{color:rgba(255,255,255,.4);font-size:11px}
.sb-logout{width:100%;padding:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:6px;cursor:pointer;font-size:12px;transition:all .12s}
.sb-logout:hover{background:rgba(201,178,152,.15);color:var(--gold)}

/* ── TOPBAR ── */
#mainContent{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--th);background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--sh1)}
.tb-title{font-size:16px;font-weight:700;flex:1;font-family:'Plus Jakarta Sans',sans-serif}
.tb-search{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;gap:7px;transition:border-color .15s}
.tb-search:focus-within{border-color:var(--gold);background:white}
.tb-search input{border:none;background:transparent;outline:none;font-size:13px;width:180px;color:var(--ink)}
.tb-notif{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative;transition:background .12s}
.tb-notif:hover{background:var(--bg)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--gold);border-radius:50%;border:2px solid white}

/* ── CONTENT ── */
.content{flex:1;padding:24px}
.section{display:none}
.section.active{display:block}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
.ph-info h2{font-size:20px;font-weight:800}
.ph-info p{color:var(--mute);font-size:12.5px;margin-top:2px}
.ph-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;border-radius:var(--r8);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--charcoal);color:white}.btn-primary:hover{background:var(--slate)}
.btn-gold{background:var(--gold);color:var(--charcoal)}.btn-gold:hover{background:var(--gold-d)}
.btn-ghost{background:white;color:var(--ink-2);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-green{background:var(--green);color:white}.btn-green:hover{background:#235e3b}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{background:#9b2e22}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px;font-weight:600}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;margin-right:5px}
.b-pending{background:#fdf5e6;color:#92400e}.b-pending::before{background:#92400e}
.b-approved{background:#edf7f1;color:#155724}.b-approved::before{background:#155724}
.b-rejected{background:var(--red-l);color:#7f1d1d}.b-rejected::before{background:#7f1d1d}
.b-production{background:var(--blue-l);color:#1e3a5f}.b-production::before{background:#1e3a5f}
.b-ready{background:var(--purple-l);color:#4c1d95}.b-ready::before{background:#4c1d95}
.b-partial{background:#fdf5e6;color:#92400e}.b-partial::before{background:#92400e}
.b-delivered{background:#edf7f1;color:#155724}.b-delivered::before{background:#155724}
.b-paid{background:#edf7f1;color:#155724}.b-paid::before{background:#155724}
.b-unpaid{background:var(--red-l);color:#7f1d1d}.b-unpaid::before{background:#7f1d1d}
.b-waiting{background:#fdf5e6;color:#92400e}.b-waiting::before{background:#92400e}
.b-direct{background:var(--gold-l);color:#7a6040}.b-direct::before{background:#7a6040}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:white;border-radius:var(--r12);border:1px solid var(--border);padding:18px 20px;box-shadow:var(--sh1)}
.kpi-label{font-size:11px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.kpi-val{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px;font-family:'Plus Jakarta Sans',sans-serif}
.kpi-sub{font-size:12px;color:var(--mute)}
.kpi-icon{float:right;font-size:26px;opacity:.1;margin-top:-2px}
.kpi.kpi-gold .kpi-val{color:var(--gold-d)}
.kpi.kpi-green .kpi-val{color:var(--green)}
.kpi.kpi-blue .kpi-val{color:var(--blue)}
.kpi.kpi-slate .kpi-val{color:var(--slate)}

/* ── CARDS ── */
.card{background:white;border-radius:var(--r12);border:1px solid var(--border);box-shadow:var(--sh1)}
.ch{padding:16px 20px;border-bottom:1px solid var(--border-l);display:flex;align-items:center;justify-content:space-between}
.ch h3{font-size:14px;font-weight:700}
.cb{padding:18px 20px}

/* ── TABLE ── */
.tbl-wrap{border-radius:var(--r12);border:1px solid var(--border);overflow:hidden;background:white}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg);padding:11px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);border-bottom:1px solid var(--border)}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border-l);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}
.td-recipe{font-family:monospace;font-size:11.5px;font-weight:700;color:var(--charcoal);background:var(--gold-l);padding:2px 7px;border-radius:4px;display:inline-block;border:1px solid rgba(201,178,152,.3)}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ftab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;color:var(--mute);transition:all .12s}
.ftab:hover{border-color:var(--gold);color:var(--gold-d)}
.ftab.active{background:var(--charcoal);color:white;border-color:var(--charcoal)}

/* ── REQUEST CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.rcard{background:white;border-radius:var(--r12);border:1px solid var(--border);padding:18px;box-shadow:var(--sh1);transition:all .15s}
.rcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.rcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.rcard-client{font-size:15px;font-weight:700}
.rcard-ref{font-size:11px;color:var(--mute);margin-top:1px;font-family:monospace}
.rcard-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.rcard-meta-row{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--mute)}
.rcard-products{background:var(--bg);border-radius:var(--r8);padding:10px 12px;margin-bottom:12px}
.rcard-prod-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border-l)}
.rcard-prod-row:last-child{border:none}
.rcard-total{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:15px;padding-top:6px}
.rcard-actions{display:flex;gap:7px;padding-top:10px;border-top:1px solid var(--border-l)}

/* ── ORDER CARDS ── */
.ocard{background:white;border-radius:var(--r12);border:1px solid var(--border);padding:18px;box-shadow:var(--sh1);cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.ocard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.ocard.oc-gold{border-left-color:var(--gold)}.ocard.oc-slate{border-left-color:var(--slate)}
.ocard.oc-green{border-left-color:var(--green)}.ocard.oc-amber{border-left-color:var(--amber)}
.ocard.oc-blue{border-left-color:var(--blue)}
.ocard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.recipe-tag{font-family:monospace;font-size:12px;font-weight:700;color:var(--charcoal);background:var(--gold-l);padding:3px 8px;border-radius:5px;border:1px solid rgba(201,178,152,.4)}
.ocard-client{font-size:14.5px;font-weight:700;margin:6px 0 3px}
.ocard-date{font-size:11.5px;color:var(--mute)}
.ocard-badges{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.ocard-assign{display:flex;gap:14px;font-size:12px;color:var(--mute);margin-top:8px;padding-top:8px;border-top:1px solid var(--border-l)}
.assignee{display:flex;align-items:center;gap:5px}
.assignee-dot{width:18px;height:18px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── PAY BAR ── */
.pay-bar-wrap{background:var(--border);border-radius:20px;height:7px;overflow:hidden;margin:6px 0}
.pay-bar-fill{height:100%;background:var(--green);border-radius:20px;transition:width .4s}
.pay-mini{display:flex;justify-content:space-between;font-size:11.5px;color:var(--mute)}

/* ── MODAL ── */
#overlay{position:fixed;inset:0;background:rgba(32,31,35,.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:18px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3)}
.modal-md{max-width:720px}.modal-lg{max-width:940px}.modal-sm{max-width:460px}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:2;border-radius:18px 18px 0 0}
.mh h3{font-size:16px;font-weight:700}
.mh-recipe{font-family:monospace;font-size:11.5px;color:var(--charcoal);background:var(--gold-l);padding:3px 9px;border-radius:5px;font-weight:700;margin-left:10px;border:1px solid rgba(201,178,152,.4)}
.mh-left{display:flex;align-items:center;gap:4px}
.mc{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;position:sticky;bottom:0;background:white;border-radius:0 0 18px 18px}
.mx{width:30px;height:30px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;color:var(--mute);transition:all .12s}
.mx:hover{background:#fdecea;color:var(--red)}

/* ── FORM ── */
.fg{margin-bottom:15px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.fl.req::after{content:' *';color:var(--gold-d)}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r8);outline:none;transition:border-color .15s;background:white;color:var(--ink)}
.fi:focus{border-color:var(--gold)}
.fi.fi-sm{padding:7px 10px;font-size:12.5px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fsec{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── PRODUCT LINE ── */
.pline-wrap{margin-bottom:10px}
.pline{display:grid;grid-template-columns:2.2fr 1fr 1fr .8fr 1fr auto;gap:7px;align-items:center;background:var(--bg);border-radius:var(--r8);padding:9px 10px;margin-bottom:7px;border:1px solid var(--border-l)}
.pline input,.pline select{background:white;font-size:12.5px}
.pline-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:17px;padding:3px 5px;border-radius:5px;transition:background .12s;line-height:1}
.pline-rm:hover{background:var(--red-l)}
.ptotal-row{display:flex;justify-content:flex-end;align-items:center;gap:14px;padding:10px 12px;background:var(--gold-l);border-radius:var(--r8);font-weight:800;font-size:15px;margin-top:2px;border:1px solid rgba(201,178,152,.3);font-family:'Plus Jakarta Sans',sans-serif}
.ptotal-label{color:var(--mute);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif}

/* ── INFO BLOCK ── */
.info-block{background:var(--bg);border-radius:var(--r8);padding:14px;border:1px solid var(--border-l)}
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-l);font-size:13px}
.info-row:last-child{border:none}
.ir-label{color:var(--mute)}
.ir-val{font-weight:600}

/* ── DELIVERY ITEMS ── */
.ditem{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r8);border:1px solid var(--border);margin-bottom:7px;background:white;transition:background .12s}
.ditem.done{background:var(--green-l);border-color:#a6d9bc}
.dchk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:12px}
.dchk.on{background:var(--green);border-color:var(--green);color:white}
.ditem-info{flex:1}
.ditem-name{font-weight:600;font-size:13px}
.ditem-detail{font-size:11.5px;color:var(--mute);margin-top:1px}
.ditem-qty{font-size:12px;font-weight:600;color:var(--mute)}

/* ── PAYMENT ── */

    <div class="rcard-top"><div><div class="rcard-client">${r.clientName}</div><div class="rcard-ref">${r.ref}</div></div>${statusBadge(r.status)}</div>

function approveRequest(reqId){
  const reqs=S.g('requests')||[];const req=reqs.find(r=>r.id===reqId);if(!req)return;
  req.status='approved';S.s('requests',reqs);
  const cnt=(S.g('orderCounter')||4)+1;S.s('orderCounter',cnt);
  const today=new Date().toISOString().split('T')[0];
  const rn='EH-'+today.replace(/-/g,'').substring(2)+'-'+String(cnt).padStart(4,'0');
  const order={id:'o'+Date.now(),recipeNum:rn,requestId:reqId,source:'sales',
    clientId:req.clientId,clientName:req.clientName,clientPhone:req.phone,clientAddress:req.address,
    products:req.products.map(p=>({...p,delivered:0})),
    totalAmount:req.totalAmount,paidAmount:0,paymentStatus:'unpaid',status:'pending',
    payments:[],mixerId:'',mixerName:'Unassigned',deliveryId:'',deliveryName:'Unassigned',
    salesId:req.createdBy,salesName:req.salesName,notes:'',
    activity:[{text:`Order created from ${req.ref} — Recipe: ${rn}`,time:today+' '+new Date().toTimeString().slice(0,5),user:App.user.name}],
    createdAt:today};
  const ords=S.g('orders')||[];ords.push(order);S.s('orders',ords);
  renderNav();updateNotifDot();
  showToast(`✓ Approved — ${rn}`,'toast-gold');
  if(App.section==='requests')renderRequests('all');else if(App.section==='dashboard')renderDashboard();
}

function doReject(reqId){

function fillClient(){
  const v=document.getElementById('nr_client').value;
  const c=(S.g('clients')||[]).find(x=>x.name===v);
  if(c){document.getElementById('nr_phone').value=c.phone||'';document.getElementById('nr_address').value=c.address||'';document.getElementById('nr_email').value=c.email||'';window._cid=c.id;}else{window._cid=null;}
}
function addPline(){
  const i=window._plc++;const w=document.getElementById('plines');const d=document.createElement('div');d.className='pline';d.id='pl_'+i;
  d.innerHTML=`<input class="fi fi-sm" placeholder="Product name" id="pn_${i}" oninput="calcTotal()"><input class="fi fi-sm" placeholder="Color Code" id="pc_${i}"><input class="fi fi-sm" placeholder="Color Name" id="pcn_${i}"><input class="fi fi-sm" type="number" placeholder="Qty" id="pq_${i}" oninput="calcTotal()"><input class="fi fi-sm" type="number" placeholder="Price/unit" id="pp_${i}" oninput="calcTotal()"><button class="pline-rm" onclick="removePline(${i})">✕</button>`;
  w.appendChild(d);

function removePline(i){const e=document.getElementById('pl_'+i);if(e)e.remove();calcTotal();}
function calcTotal(){
  let t=0;document.querySelectorAll('.pline').forEach(pl=>{const i=pl.id.replace('pl_','');const q=parseFloat(document.getElementById('pq_'+i)?.value)||0;const p=parseFloat(document.getElementById('pp_'+i)?.value)||0;t+=q*p;});
  const e=document.getElementById('reqTotal');if(e)e.textContent=fmtCur(t);return t;
}
function submitNewRequest(){
  const client=document.getElementById('nr_client').value.trim();
  const phone=document.getElementById('nr_phone').value.trim();
  const addr=document.getElementById('nr_address').value.trim();
  if(!client||!phone||!addr){alert('Client name, phone and address are required.');return;}
  const products=[];
  document.querySelectorAll('.pline').forEach(pl=>{
    const i=pl.id.replace('pl_','');const name=(document.getElementById('pn_'+i)?.value||'').trim();
    const qty=parseFloat(document.getElementById('pq_'+i)?.value)||0;const price=parseFloat(document.getElementById('pp_'+i)?.value)||0;
    if(name&&qty>0)products.push({name,colorCode:document.getElementById('pc_'+i)?.value||'',colorName:document.getElementById('pcn_'+i)?.value||'',qty,unit:'L',price,total:qty*price});
  });
  if(!products.length){alert('Add at least one product.');return;}
  const total=products.reduce((a,p)=>a+p.total,0);
  const cnt=(S.g('reqCounter')||5)+1;S.s('reqCounter',cnt);
  const ref='REQ-'+String(cnt).padStart(3,'0');
  const req={id:'r'+Date.now(),ref,clientId:window._cid||'',clientName:client,phone,email:document.getElementById('nr_email').value||'',address:addr,products,totalAmount:total,notes:document.getElementById('nr_notes').value||'',status:'pending',createdBy:App.user.id,salesName:App.user.name,createdAt:new Date().toISOString()};
  const reqs=S.g('requests')||[];reqs.push(req);S.s('requests',reqs);
  closeModal();renderNav();updateNotifDot();showToast(`${ref} submitted`,'toast-gold');renderRequests('all');
}

        </select></div>

function togDel(oid,idx){
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  const p=o.products[idx];p.delivered=p.delivered>=p.qty?0:p.qty;
  const allD=o.products.every(x=>x.delivered>=x.qty);const anyD=o.products.some(x=>x.delivered>0);
  if(allD)o.status='delivered';else if(anyD)o.status='partial';else o.status='pending';
  const now=new Date();
  o.activity.push({text:`${p.delivered>0?'Delivered':'Reset'}: ${p.name}`,time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});
  S.s('orders',orders);showToast(p.delivered>0?'Item delivered':'Delivery reset','toast-gold');openOrderModal(oid);
}
function assignUser(oid,role,uid){
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  const u=(S.g('users')||[]).find(x=>x.id===uid);const now=new Date();
  if(role==='mixer'){o.mixerId=uid;o.mixerName=u?u.name:'Unassigned';o.activity.push({text:`Mixer assigned: ${o.mixerName}`,time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});}
  else{o.deliveryId=uid;o.deliveryName=u?u.name:'Unassigned';o.activity.push({text:`Delivery assigned: ${o.deliveryName}`,time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});}
  S.s('orders',orders);showToast('Assignment saved','toast-gold');
}
function updateOrderStatus(oid,val){
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  const prev=o.status;o.status=val;const now=new Date();
  o.activity.push({text:`Status: ${cap(prev)} → ${cap(val)}`,time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});
  S.s('orders',orders);showToast('Status updated','toast-gold');
}
function updatePayStatus(oid,val){
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  o.paymentStatus=val;S.s('orders',orders);showToast('Payment status updated','toast-gold');
}
function openAddPayment(oid){
  openModal(`<div class="mh"><div class="mh-left"><h3>Add Payment</h3></div><button class="mx" onclick="closeModal()">✕</button></div>
  <div class="mc">
    <div class="fr2">
      <div class="fg"><label class="fl req">Amount (EGP)</label><input class="fi" type="number" id="pay_amt" placeholder="0.00"></div>
      <div class="fg"><label class="fl req">Date</label><input class="fi" type="date" id="pay_dt" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="fg"><label class="fl">Note</label><input class="fi" id="pay_nt" placeholder="e.g. Cash, partial…"></div>
  </div>
  <div class="mf"><button class="btn btn-ghost" onclick="openOrderModal('${oid}')">← Back</button>
    <button class="btn btn-green" onclick="savePayment('${oid}')">Save Payment</button></div>`,'modal-sm');
}
function savePayment(oid){
  const amt=parseFloat(document.getElementById('pay_amt').value)||0;
  const dt=document.getElementById('pay_dt').value;
  if(!amt||!dt){alert('Enter amount and date.');return;}
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  o.paidAmount+=amt;o.payments.push({id:'pay'+Date.now(),amount:amt,date:dt,note:document.getElementById('pay_nt').value,by:App.user.name});
  if(o.paidAmount>=o.totalAmount)o.paymentStatus='paid';else if(o.paidAmount>0)o.paymentStatus='partial';
  const now=new Date();
  o.activity.push({text:`Payment: ${fmtCur(amt)}`,time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});
  S.s('orders',orders);showToast(`${fmtCur(amt)} payment saved`,'toast-green');openOrderModal(oid);
}

function renderReports(){

      <div class="fg"><label class="fl">Period</label>
        <select class="fi" id="rep_per" onchange="genReport()">
          <option value="3">Last 3 Months</option><option value="6" selected>Last 6 Months</option><option value="12">Last 12 Months</option></select></div>
    </div></div>
  <div id="repOut"></div>`;

function genReport(){
  const cid=document.getElementById('rep_cl').value;const mo=parseInt(document.getElementById('rep_per').value)||6;
  const cut=new Date();cut.setMonth(cut.getMonth()-mo);
  let ords=(S.g('orders')||[]).filter(o=>new Date(o.createdAt)>=cut);
  if(cid!=='all')ords=ords.filter(o=>o.clientId===cid);
  const rev=ords.reduce((a,o)=>a+o.totalAmount,0);const paid=ords.reduce((a,o)=>a+o.paidAmount,0);const del=ords.filter(o=>o.status==='delivered').length;
  const bkts={};for(let i=mo-1;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const k=d.toISOString().slice(0,7);bkts[k]=0;}
  ords.forEach(o=>{const k=(o.createdAt||'').slice(0,7);if(bkts[k]!==undefined)bkts[k]+=o.totalAmount;});
  const maxR=Math.max(...Object.values(bkts),1);
  const bars=Object.entries(bkts).map(([k,v])=>`<div class="chart-bar-col"><div class="chart-bar" style="height:${Math.max(v/maxR*100,2)}%"><div class="chart-bar-tip">${fmtCur(v)}</div></div><div class="chart-lbl">${k.slice(5)}</div></div>`).join('');
  const pm={};ords.forEach(o=>o.products.forEach(p=>{if(!pm[p.name])pm[p.name]=0;pm[p.name]+=p.qty;}));
  const sp=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);const mq=sp[0]?sp[0][1]:1;
  const cr=rev>0?Math.round(paid/rev*100):0;
  document.getElementById('repOut').innerHTML=`
  <div class="report-box"><div class="report-sec-title">Revenue by Month</div>
    <div class="chart-wrap">${bars}</div>
    <div class="report-stats-grid">
      <div class="rstat"><div class="rstat-val">${ords.length}</div><div class="rstat-lbl">Orders</div></div>
      <div class="rstat"><div class="rstat-val">${fmtCur(rev)}</div><div class="rstat-lbl">Revenue</div></div>
      <div class="rstat"><div class="rstat-val">${del}</div><div class="rstat-lbl">Delivered</div></div>
    </div></div>
  <div class="two-col">
    <div class="report-box"><div class="report-sec-title">Payment Summary</div>
      <div class="pay-nums">
        <div class="pay-num pn-slate"><div class="pn-val">${fmtCur(rev)}</div><div class="pn-lbl">Invoiced</div></div>
        <div class="pay-num pn-green"><div class="pn-val">${fmtCur(paid)}</div><div class="pn-lbl">Collected</div></div>
        <div class="pay-num pn-red"><div class="pn-val">${fmtCur(rev-paid)}</div><div class="pn-lbl">Outstanding</div></div>
      </div>
      <div class="pay-bar-wrap" style="height:9px"><div class="pay-bar-fill" style="width:${cr}%"></div></div>
      <div class="pay-mini"><span>Collection Rate</span><span style="font-weight:700">${cr}%</span></div>
    </div>
    <div class="report-box"><div class="report-sec-title">Top Products</div>
      ${sp.length?sp.map(([nm,qty],i)=>`<div class="prod-rank"><div class="prod-rank-num">${i+1}</div>
        <div style="flex:1"><div style="font-size:12.5px;font-weight:600">${nm}</div>
          <div class="prod-bar" style="margin-top:5px"><div class="prod-bar-fill" style="width:${qty/mq*100}%"></div></div>
        </div><div style="font-size:12px;font-weight:700;color:var(--mute)">${qty}L</div></div>`).join(''):'<div class="empty" style="padding:20px">No data</div>'}
    </div>
  </div>`;
}

function workCard(o,role,done){
  return`<div class="work-card" style="${done?'opacity:.65':''}">
    <div class="work-head"><div><span class="work-recipe">${o.recipeNum}</span><div class="work-client">${o.clientName}</div><div class="work-note">${o.clientAddress}</div></div><div>${statusBadge(o.status)}</div></div>

    ${role==='mixer'&&!done?`<button class="btn btn-gold btn-sm" onclick="markMixed('${o.id}')">✓ Mark Mixing Done</button>`:''}
    <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="openOrderModal('${o.id}')">View Order</button>

}
function markMixed(oid){
  const orders=S.g('orders')||[];const o=orders.find(x=>x.id===oid);if(!o)return;
  o.status='ready';const now=new Date();
  o.activity.push({text:'Mixing completed — ready for delivery',time:now.toISOString().split('T')[0]+' '+now.toTimeString().slice(0,5),user:App.user.name});
  S.s('orders',orders);showToast('Marked as ready for delivery','toast-gold');renderMyWork();
}

        <div class="info-row"><span class="ir-label">Paid</span><span class="ir-val" style="color:var(--green)">${fmtCur(o.paidAmount)}</span></div>
        <div class="info-row"><span class="ir-label">Balance</span><span class="ir-val" style="color:var(--red)">${fmtCur(o.totalAmount-o.paidAmount)}</span></div>

function addCPline(){
  const i=window._cplc++;const w=document.getElementById('cplines');const d=document.createElement('div');d.className='pline';d.id='cp_'+i;
  d.innerHTML=`<input class="fi fi-sm" placeholder="Product name" id="cpn_${i}" oninput="calcCT()"><input class="fi fi-sm" placeholder="Color Code" id="cpc_${i}"><input class="fi fi-sm" placeholder="Color Name" id="cpcn_${i}"><input class="fi fi-sm" type="number" placeholder="Qty" id="cpq_${i}" oninput="calcCT()"><input class="fi fi-sm" type="number" placeholder="Price/unit" id="cpp_${i}" oninput="calcCT()"><button class="pline-rm" onclick="rmCPline(${i})">✕</button>`;
  w.appendChild(d);
}
function rmCPline(i){const e=document.getElementById('cp_'+i);if(e)e.remove();calcCT();}
function calcCT(){
  let t=0;document.querySelectorAll('#cplines .pline').forEach(pl=>{const i=pl.id.replace('cp_','');const q=parseFloat(document.getElementById('cpq_'+i)?.value)||0;const p=parseFloat(document.getElementById('cpp_'+i)?.value)||0;t+=q*p;});
  const e=document.getElementById('ctotal');if(e)e.textContent=fmtCur(t);return t;
}
function submitClientOrder(){
  const addr=document.getElementById('co_addr').value.trim();const phone=document.getElementById('co_phone').value.trim();
  if(!addr||!phone){alert('Please enter delivery address and phone.');return;}
  const products=[];
  document.querySelectorAll('#cplines .pline').forEach(pl=>{
    const i=pl.id.replace('cp_','');const name=(document.getElementById('cpn_'+i)?.value||'').trim();
    const qty=parseFloat(document.getElementById('cpq_'+i)?.value)||0;const price=parseFloat(document.getElementById('cpp_'+i)?.value)||0;
    if(name&&qty>0)products.push({name,colorCode:document.getElementById('cpc_'+i)?.value||'',colorName:document.getElementById('cpcn_'+i)?.value||'',qty,unit:'L',price,total:qty*price,delivered:0});
  });
  if(!products.length){alert('Add at least one product with name and quantity.');return;}
  const total=products.reduce((a,p)=>a+p.total,0);
  const cnt=(S.g('orderCounter')||10)+1;S.s('orderCounter',cnt);
  const today=new Date().toISOString().split('T')[0];
  const rn='EH-'+today.replace(/-/g,'').substring(2)+'-'+String(cnt).padStart(4,'0');
  const order={id:'o'+Date.now(),recipeNum:rn,requestId:'',source:'client',
    clientId:App.user.clientId,clientName:App.user.name,clientPhone:phone,clientAddress:addr,
    products,totalAmount:total,paidAmount:0,paymentStatus:'unpaid',status:'pending',
    payments:[],mixerId:'',mixerName:'Unassigned',deliveryId:'',deliveryName:'Unassigned',
    salesId:'',salesName:'Client Portal',notes:document.getElementById('co_notes').value||'',
    activity:[{text:`Direct order via Client Portal — Recipe: ${rn}`,time:today+' '+new Date().toTimeString().slice(0,5),user:App.user.name}],
    createdAt:today};
  const ords=S.g('orders')||[];ords.push(order);S.s('orders',ords);
  showToast(`Order ${rn} placed!`,'toast-gold');navigate('clientorders');
}

function showToast(msg,cls=''){
  const t=document.getElementById('toast');t.className='toast '+(cls||'');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function statusBadge(s){
  const m={pending:'b-pending',approved:'b-approved',rejected:'b-rejected',mixing:'b-production',ready:'b-ready',partial:'b-partial',delivered:'b-delivered'};
  const l={pending:'Pending',approved:'Approved',rejected:'Rejected',mixing:'Mixing',ready:'Ready',partial:'Partial',delivered:'Delivered'};
  return`<span class="badge ${m[s]||'b-pending'}">${l[s]||s}</span>`;
}
function payBadge(s){
  const m={paid:'b-paid',partial:'b-partial',unpaid:'b-unpaid'};
  const l={paid:'Paid',partial:'Partial',unpaid:'Unpaid'};
  return`<span class="badge ${m[s]||'b-unpaid'}">${l[s]||s}</span>`;
}
function fmtCur(n){return'EGP '+(n||0).toLocaleString('en-EG',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch{return d;}}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
